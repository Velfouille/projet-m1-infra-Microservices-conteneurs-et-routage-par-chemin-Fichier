AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamFlex - Couche 2 : ALB, Target Groups et Security Groups. Securite : ALB SG (HTTP/80 depuis Internet), ECS SG (8080/5000 depuis ALB only).'

Parameters:
  ProjectName:
    Type: String
    Default: streamflex
  VpcId:
    Type: String
    Description: L'ID du VPC depuis la stack réseau
  PublicSubnet1:
    Type: String
    Description: Le subnet public AZ1 depuis la stack réseau
  PublicSubnet2:
    Type: String
    Description: Le subnet public AZ2 depuis la stack réseau

Resources:
  # 1. Security Groups (Principe du moindre privilège)
  # ALB Security Group : autorise le trafic HTTP depuis Internet (80)
  # et le forwarde vers les conteneurs ECS via ECSSecurityGroup.
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      GroupDescription: "ALB : trafic HTTP entrant depuis Internet (80) vers ECS"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: "HTTP public depuis Internet"
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-alb-sg

  # ECS Security Group : autorise UNIQUEMENT le trafic provenant de l'ALB
  # sur les ports applicatifs (8080 Catalog, 5000 User).
  # Aucun accès direct depuis Internet n'est autorisé.
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VpcId
      GroupDescription: "ECS : trafic entrant depuis ALB (8080 Catalog, 5000 User)"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: "Trafic Catalog (8080) depuis ALB"
        - IpProtocol: tcp
          FromPort: 5000
          ToPort: 5000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: "Trafic User (5000) depuis ALB"
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-ecs-sg

  # 2. Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  # 3. Target Groups (Où l'ALB doit envoyer le trafic)
  CatalogTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg-catalog
      VpcId: !Ref VpcId
      Port: 8080
      Protocol: HTTP
      TargetType: ip # Requis pour AWS Fargate
      HealthCheckPath: /health

  UserTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg-user
      VpcId: !Ref VpcId
      Port: 5000
      Protocol: HTTP
      TargetType: ip # Requis pour AWS Fargate
      HealthCheckPath: /health

  # 4. Listener et Règles de routage par chemin
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: 404
            ContentType: text/plain
            MessageBody: "Erreur 404 - Microservice introuvable sur StreamFlex"

  CatalogListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - "/catalog*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref CatalogTargetGroup

  UserListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values:
            - "/user*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref UserTargetGroup

Outputs:
  ALBUrl:
    Description: URL publique du Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  ECSSecurityGroupId:
    Description: L'ID du Security Group pour les conteneurs
    Value: !Ref ECSSecurityGroup
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-ECSSG"
  CatalogTargetGroupArn:
    Value: !Ref CatalogTargetGroup
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-CatalogTG"
  UserTargetGroupArn:
    Value: !Ref UserTargetGroup
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-UserTG"

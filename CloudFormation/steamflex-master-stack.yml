AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamFlex - Master Stack (Réseau, ALB, ECS)'

Parameters:
  # Tu dois indiquer ici le nom du bucket S3 où tu vas stocker tes templates YAML
  TemplateBucket:
    Type: String
    Description: Nom du bucket S3 contenant les templates enfants

Resources:
  # 1. Couche Réseau
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucket}.s3.amazonaws.com/streamflex-infra.yaml"

  # 2. Couche Load Balancer (Dépend du Réseau)
  ALBStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucket}.s3.amazonaws.com/streamflex-alb.yaml"

  # 3. Couche ECS et Front-End (Dépend de l'ALB)
  ECSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ALBStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucket}.s3.amazonaws.com/streamflex-ecs.yaml"
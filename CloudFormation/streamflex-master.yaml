AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamFlex - Master Stack (Reseau, ALB, ECS). Securite : ALB SG (HTTP/0.0.0.0), ECS SG (trafic depuis ALB only), RDS SG (subnets prives only).'

Parameters:
  TemplateBucket:
    Type: String
    Description: Nom du bucket S3 contenant les templates enfants
  ProjectName:
    Type: String
    Default: streamflex
    Description: Nom du projet utilisé pour tagger les ressources
### DEBUT MODIFICATION ( NOÉ) ###
  # Ajout du paramètre pour gérer le nombre de conteneurs (Active/Passive)
  NbConteneurs:
    Type: Number
    Default: 2
    Description: Mettre à 2 pour la région Active, et 0 pour la région de Secours (Pilot Light)
  TeamPrefix:
    Type: String
    Description: Initiales de l'equipe pour l'unicite des buckets S3
  RDSMasterPassword:
    Type: String
    NoEcho: true
    Default: StreamflexAdmin123
    Description: Mot de passe master pour le cluster Aurora MySQL User
  PeerDBHost:
    Type: String
    Default: ""
    Description: Endpoint du cluster RDS peer pour replication cross-region
  PublicRDS:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Rendre le cluster RDS accessible publiquement
### FIN MODIFICATION ( NOÉ) ###

Resources:
  # 1. Couche Réseau
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucket}.s3.amazonaws.com/streamflex-infra.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        RDSMasterPassword: !Ref RDSMasterPassword
        PublicRDS: !Ref PublicRDS

  # 2. Couche Load Balancer (Dépend du Réseau)
  ALBStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucket}.s3.amazonaws.com/streamflex-alb.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PublicSubnet1: !GetAtt NetworkStack.Outputs.PublicSubnet1
        PublicSubnet2: !GetAtt NetworkStack.Outputs.PublicSubnet2

  # 3. Couche ECS et Front-End (Dépend de l'ALB)
  ECSStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: ALBStack
    Properties:
      TemplateURL: !Sub "https://${TemplateBucket}.s3.amazonaws.com/streamflex-ecs.yaml"
      Parameters:
        ProjectName: !Ref ProjectName
        NbConteneurs: !Ref NbConteneurs
        TeamPrefix: !Ref TeamPrefix
        PrivateSubnet1: !GetAtt NetworkStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt NetworkStack.Outputs.PrivateSubnet2
        ECSSecurityGroupId: !GetAtt ALBStack.Outputs.ECSSecurityGroupId
        CatalogTargetGroupArn: !GetAtt ALBStack.Outputs.CatalogTargetGroupArn
        UserTargetGroupArn: !GetAtt ALBStack.Outputs.UserTargetGroupArn
        UserDBEndpoint: !GetAtt NetworkStack.Outputs.UserDBEndpoint
        RDSMasterPassword: !Ref RDSMasterPassword
        PeerDBHost: !Ref PeerDBHost

Outputs:
  MasterALBUrl:
    Description: URL de l'Application Load Balancer
    # On va chercher l'output "ALBUrl" à l'intérieur de la sous-pile "ALBStack"
    Value: !GetAtt ALBStack.Outputs.ALBUrl
  UserDBEndpoint:
    Description: Endpoint du cluster Aurora MySQL User
    Value: !GetAtt NetworkStack.Outputs.UserDBEndpoint

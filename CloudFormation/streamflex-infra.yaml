AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamFlex - Couche Réseau (VPC, Subnets, IGW, NAT) et DB'

Parameters:
  ProjectName:
    Type: String
    Default: streamflex
    Description: Nom du projet utilisé pour tagger les ressources

### DEBUT MODIFICATION ( NOÉ) ###
# Condition pour s'assurer que la base de données ne soit créée qu'une seule fois 
# (depuis la région Active) pour éviter les erreurs CloudFormation.
Conditions:
  IsActiveRegion: !Equals [ !Ref "AWS::Region", "us-east-1" ]
### FIN MODIFICATION ( NOÉ) ###

Resources:
# 0. Base de données Active (Déploiement régional forcé par les restrictions de droits)
  CatalogDatabase:
    Type: AWS::DynamoDB::Table
    Condition: IsActiveRegion 
    Properties:
      TableName: !Sub "${ProjectName}-catalog-db"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

### DEBUT MODIFICATION ( NOÉ) ###
  # 0. Base de données Active-Active (DynamoDB Global Tables) // PAS UTILISABLE CAR PAS LES DROITS SUR LABROLE //
#  CatalogDatabase:
#    Type: AWS::DynamoDB::GlobalTable
#    Condition: IsActiveRegion 
#    Properties:
#      TableName: !Sub "${ProjectName}-catalog-db"
#      AttributeDefinitions:
#        - AttributeName: id
#          AttributeType: S
#      KeySchema:

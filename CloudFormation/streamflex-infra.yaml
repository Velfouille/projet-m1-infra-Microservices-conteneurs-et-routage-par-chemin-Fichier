AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamFlex - Couche Reseau (VPC, Subnets, IGW, NAT) et DB (DynamoDB Catalog + RDS Aurora User). Securite : RDS SG (MySQL/3306 subnets prives only), DynamoDB chiffre par defaut.'

Parameters:
  ProjectName:
    Type: String
    Default: streamflex
    Description: Nom du projet utilisé pour tagger les ressources
  RDSMasterPassword:
    Type: String
    NoEcho: true
    Default: StreamflexAdmin123
    Description: Mot de passe master pour le cluster Aurora MySQL User
  PublicRDS:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: Rendre le cluster RDS accessible publiquement (pour replication cross-region)

Conditions:
  IsActiveRegion: !Equals [ !Ref "AWS::Region", "us-east-1" ]
  MakePublicRDS: !Equals [!Ref PublicRDS, "true"]

Resources:
  # =========================================================
  # COUCHE BASE DE DONNÉES NOSQL (DYNAMODB - CATALOGUE)
  # Chiffrement au repos : activé par défaut (AWS owned key)
  # Accès : via API AWS signée (IAM) - pas d'exposition publique
  # Réplication cross-région : DynamoDB Stream + Lambda
  # =========================================================

  CatalogDatabase:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-catalog-db"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  SyncCatalogLambda:
    Type: AWS::Lambda::Function
    Condition: IsActiveRegion
    Properties:
      FunctionName: !Sub "${ProjectName}-dynamodb-sync-stream"
      Handler: index.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Runtime: python3.9
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Sub "${ProjectName}-catalog-db"
          DEST_REGION: "us-west-2"
      Code:
        ZipFile: |
          import boto3
          import os

          def lambda_handler(event, context):
              dest_region = os.environ['DEST_REGION']
              table_name = os.environ['TABLE_NAME']
              dynamo_dest = boto3.client('dynamodb', region_name=dest_region)
              for record in event['Records']:
                  event_name = record['eventName']
                  try:
                      if event_name in ['INSERT', 'MODIFY']:
                          new_image = record['dynamodb']['NewImage']
                          dynamo_dest.put_item(TableName=table_name, Item=new_image)
                      elif event_name == 'REMOVE':
                          keys = record['dynamodb']['Keys']
                          dynamo_dest.delete_item(TableName=table_name, Key=keys)
                  except Exception as e:
                      print(f"Erreur lors de la replication : {str(e)}")
              return {"status": 200, "message": "Synchronisation continue terminee"}

  DynamoDBStreamToLambda:
    Type: AWS::Lambda::EventSourceMapping
    Condition: IsActiveRegion
    Properties:
      EventSourceArn: !GetAtt CatalogDatabase.StreamArn
      FunctionName: !Ref SyncCatalogLambda
      StartingPosition: LATEST

  # =========================================================
  # COUCHE RESEAU (VPC)
  # =========================================================

  MainVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MainVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-az1

  PublicSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-az2

  PrivateSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-az1

  PrivateSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-az2

  NatElasticIP1:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatElasticIP1.AllocationId
      SubnetId: !Ref PublicSubnetAZ1
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-az1

  NatElasticIP2:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatElasticIP2.AllocationId
      SubnetId: !Ref PublicSubnetAZ2
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-az2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetAZ1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetAZ2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt-az1

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetAZ1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt-az2

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway2

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetAZ2
      RouteTableId: !Ref PrivateRouteTable2

  # =========================================================
  # COUCHE BASE DE DONNÉES RELATIONNELLE (RDS AURORA - MICROSERVICE USER)
  # - Chiffrement au repos : activé par défaut sur Aurora (AES-256)
  # - Accès : restreint aux subnets privés (10.0.2.0/24, 10.0.3.0/24)
  # - West region uniquement : PublicRDS=true ouvre le port 3306 à 0.0.0.0/0
  #   pour permettre la réplication cross-région depuis east ECS via NAT
  # - Mot de passe : transmis en paramètre NoEcho (masqué dans les logs)
  # =========================================================

  RDSSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Subnets prives pour le cluster Aurora"
      SubnetIds:
        - !Ref PrivateSubnetAZ1
        - !Ref PrivateSubnetAZ2

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    DependsOn: MainVPC
    Properties:
      GroupDescription: "Acces MySQL (3306) depuis les conteneurs ECS (subnets prives)"
      VpcId: !Ref MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.2.0/24
          Description: "Trafic MySQL depuis PrivateSubnetAZ1"
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.3.0/24
          Description: "Trafic MySQL depuis PrivateSubnetAZ2"

  PublicRDSAccess:
    Condition: MakePublicRDS
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RDSSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      CidrIp: 0.0.0.0/0
      Description: "Acces public MySQL pour replication cross-region (west only)"

  UserDBCluster:
    Type: AWS::RDS::DBCluster
    DependsOn: RDSSecurityGroup
    Properties:
      Engine: aurora-mysql
      EngineVersion: "8.0.mysql_aurora.3.04.0"
      DBClusterIdentifier: !Sub "${ProjectName}-user-cluster"
      MasterUsername: admin
      MasterUserPassword: !Ref RDSMasterPassword
      DBSubnetGroupName: !Ref RDSSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 1
      DeletionProtection: false

  UserDBInstance:
    Type: AWS::RDS::DBInstance
    DependsOn: UserDBCluster
    Properties:
      Engine: aurora-mysql
      DBClusterIdentifier: !Ref UserDBCluster
      DBInstanceClass: db.t3.medium
      DBInstanceIdentifier: !Sub "${ProjectName}-user-instance"
      PubliclyAccessible:
        Fn::If:
          - MakePublicRDS
          - true
          - false
      CopyTagsToSnapshot: true

Outputs:
  VpcId:
    Value: !Ref MainVPC
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-VpcId"
  PublicSubnet1:
    Value: !Ref PublicSubnetAZ1
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-PublicSubnet1"
  PublicSubnet2:
    Value: !Ref PublicSubnetAZ2
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-PublicSubnet2"
  PrivateSubnet1:
    Value: !Ref PrivateSubnetAZ1
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-PrivateSubnet1"
  PrivateSubnet2:
    Value: !Ref PrivateSubnetAZ2
    Export:
      Name: !Sub "${ProjectName}-${AWS::StackName}-PrivateSubnet2"
  UserDBEndpoint:
    Description: Endpoint du cluster Aurora MySQL User
    Value: !GetAtt UserDBCluster.Endpoint.Address

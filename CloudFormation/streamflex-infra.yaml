AWSTemplateFormatVersion: '2010-09-09'
Description: 'StreamFlex - Couche Reseau (VPC, Subnets, IGW, NAT) et DB (Sync Continue DynamoDB Streams & RDS)'

Parameters:
  ProjectName:
    Type: String
    Default: streamflex
    Description: Nom du projet utilisé pour tagger les ressources

# Condition pour s'assurer de déployer les bonnes ressources dans les bonnes régions
Conditions:
  IsActiveRegion: !Equals [ !Ref "AWS::Region", "us-east-1" ]
  IsPassiveRegion: !Equals [ !Ref "AWS::Region", "us-west-2" ]

Resources:
  # =========================================================
  # COUCHE BASE DE DONNÉES NOSQL (DYNAMODB - CATALOGUE)
  # =========================================================
  
  # 0.1 Base de données DynamoDB (Créée dans les deux régions)
  CatalogDatabase:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-catalog-db"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      # Activation de DynamoDB Streams pour capturer chaque modification
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # 0.2 Fonction Lambda de Synchronisation Continue
  SyncCatalogLambda:
    Type: AWS::Lambda::Function
    Condition: IsActiveRegion
    Properties:
      FunctionName: !Sub "${ProjectName}-dynamodb-sync-stream"
      Handler: index.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole" 
      Runtime: python3.9
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Sub "${ProjectName}-catalog-db"
          DEST_REGION: "us-west-2"
      Code:
        ZipFile: |
          import boto3
          import os

          def lambda_handler(event, context):
              dest_region = os.environ['DEST_REGION']
              table_name = os.environ['TABLE_NAME']
              dynamo_dest = boto3.client('dynamodb', region_name=dest_region)
              for record in event['Records']:
                  event_name = record['eventName']
                  try:
                      if event_name in ['INSERT', 'MODIFY']:
                          new_image = record['dynamodb']['NewImage']
                          dynamo_dest.put_item(TableName=table_name, Item=new_image)
                      elif event_name == 'REMOVE':
                          keys = record['dynamodb']['Keys']
                          dynamo_dest.delete_item(TableName=table_name, Key=keys)
                  except Exception as e:
                      print(f"Erreur lors de la réplication : {str(e)}")
              return {"status": 200, "message": "Synchronisation continue terminée"}

  # 0.3 Le lien (Trigger) entre le Stream DynamoDB et la Lambda
  DynamoDBStreamToLambda:
    Type: AWS::Lambda::EventSourceMapping
    Condition: IsActiveRegion
    Properties:
      EventSourceArn: !GetAtt CatalogDatabase.StreamArn
      FunctionName: !Ref SyncCatalogLambda
      StartingPosition: LATEST

  # 0.3a Fonction Lambda de Synchronisation Continue pour USER
  SyncUserLambda:
    Type: AWS::Lambda::Function
    Condition: IsActiveRegion
    Properties:
      FunctionName: !Sub "${ProjectName}-dynamodb-sync-user-stream"
      Handler: index.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Runtime: python3.9
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Sub "${ProjectName}-user-db"
          DEST_REGION: "us-west-2"
      Code:
        ZipFile: |
          import boto3
          import os

          def lambda_handler(event, context):
              dest_region = os.environ['DEST_REGION']
              table_name = os.environ['TABLE_NAME']
              dynamo_dest = boto3.client('dynamodb', region_name=dest_region)
              for record in event['Records']:
                  event_name = record['eventName']
                  try:
                      if event_name in ['INSERT', 'MODIFY']:
                          new_image = record['dynamodb']['NewImage']
                          dynamo_dest.put_item(TableName=table_name, Item=new_image)
                      elif event_name == 'REMOVE':
                          keys = record['dynamodb']['Keys']
                          dynamo_dest.delete_item(TableName=table_name, Key=keys)
                  except Exception as e:
                      print(f"Erreur lors de la replication user : {str(e)}")
              return {"status": 200, "message": "Synchronisation continue user terminee"}

  UserDynamoDBStreamToLambda:
    Type: AWS::Lambda::EventSourceMapping
    Condition: IsActiveRegion
    Properties:
      EventSourceArn: !GetAtt UserDatabase.StreamArn
      FunctionName: !Ref SyncUserLambda
      StartingPosition: LATEST

  # 0.3b Base de données DynamoDB pour USER (Alternative à RDS)
  UserDatabase:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-user-db"
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # 0.3c Lambda pour gérer les utilisateurs (Endpoint /user)
  UserManagementLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-user-api"
      Handler: index.lambda_handler
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Runtime: python3.9
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Sub "${ProjectName}-user-db"
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def lambda_handler(event, context):
              """Gestion des utilisateurs via DynamoDB"""
              try:
                  path = event.get('path', '/user')
                  method = event.get('httpMethod', 'GET')
                  
                  # GET /user - Lister tous les utilisateurs
                  if method == 'GET' and path == '/user':
                      response = table.scan()
                      users = response.get('Items', [])
                      return {
                          'statusCode': 200,
                          'body': json.dumps({
                              'message': 'Utilisateurs récupérés',
                              'count': len(users),
                              'users': users
                          })
                      }
                  
                  # GET /user/:id - Récupérer un utilisateur
                  if method == 'GET' and '/user/' in path:
                      user_id = path.split('/')[-1]
                      response = table.get_item(Key={'userId': user_id})
                      if 'Item' in response:
                          return {
                              'statusCode': 200,
                              'body': json.dumps(response['Item'])
                          }
                      return {
                          'statusCode': 404,
                          'body': json.dumps({'error': 'Utilisateur non trouvé'})
                      }
                  
                  # POST /user - Créer un utilisateur
                  if method == 'POST' and path == '/user':
                      body = json.loads(event.get('body', '{}'))
                      user_id = body.get('userId', 'user-' + str(datetime.now().timestamp()))
                      user_data = {
                          'userId': user_id,
                          'name': body.get('name', 'Utilisateur'),
                          'email': body.get('email', ''),
                          'createdAt': datetime.now().isoformat()
                      }
                      table.put_item(Item=user_data)
                      return {
                          'statusCode': 201,
                          'body': json.dumps({'message': 'Utilisateur créé', 'user': user_data})
                      }
                  
                  return {
                      'statusCode': 400,
                      'body': json.dumps({'error': 'Route non supportée'})
                  }
                  
              except Exception as e:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }


#========================================================
# COUCHE BASE DE DONNÉES RELATIONNELLE (RDS - MICROSERVICE USER)
# COMMENTÉE : LabRole n'a pas les permissions RDS
# À décommenter dans un environnement AWS complet
